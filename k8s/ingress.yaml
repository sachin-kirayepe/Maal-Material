apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: constructos-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
  - host: constructos.io
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: constructos-api-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: constructos-web-service
            port:
              number: 80
