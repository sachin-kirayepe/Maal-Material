apiVersion: apps/v1
kind: Deployment
metadata:
  name: constructos-api
  namespace: production
  labels:
    app: constructos-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: constructos-api
  template:
    metadata:
      labels:
        app: constructos-api
    spec:
      containers:
      - name: constructos-api
        image: constructos/api:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: constructos-secrets
              key: DATABASE_URL
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: constructos-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: constructos-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
