apiVersion: apps/v1
kind: Deployment
metadata:
  name: constructos-web
  namespace: production
  labels:
    app: constructos-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: constructos-web
  template:
    metadata:
      labels:
        app: constructos-web
    spec:
      containers:
      - name: constructos-web
        image: constructos/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: constructos-web-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: constructos-web
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
