name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --build --prod
        env:
          NETLIFY_AUTH_TOKEN: nfp_enAsiKHVkTbbFM5A2tkDdBBittEZsuyyb406
          NETLIFY_SITE_ID: ee106fb7-9d07-4a7b-a122-431727ba7713
