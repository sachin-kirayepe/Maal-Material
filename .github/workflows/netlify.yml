name: Deploy to Netlify
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace packages
        run: pnpm turbo run build --filter="@constructos/*" --filter="!@constructos/web" --filter="!@constructos/api"

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --build --prod --filter @constructos/web > deploy_log.txt 2>&1
        env:
          NETLIFY_AUTH_TOKEN: nfp_enAsiKHVkTbbFM5A2tkDdBBittEZsuyyb406
          NETLIFY_SITE_ID: ee106fb7-9d07-4a7b-a122-431727ba7713
          NEXT_PUBLIC_SUPABASE_URL: "https://tuhgxhggnuhojucuisbx.supabase.com"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_6M1vkF697LV5U_m9Vx_0RA_AAAKx8zw"
          NEXT_PUBLIC_MAINTENANCE_MODE: "false"

      - name: Commit Logs
        if: always()
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add deploy_log.txt
          git commit -m 'Auto-add deploy log' || true
          git push

